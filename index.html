<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barça Dashboard & AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>
    <div class="container">
        <section id="barca-widget">
            <h2>FC Barcelona Hub</h2>
            
            <div id="widget-6edamnzlaqzm" class="scoreaxis-widget" style="width: auto; height: auto; font-size: 14px; background-color: #ffffff; color: #141416; border: 1px solid; border-color: #ecf1f7; overflow: auto;">
                <script src="https://widgets.scoreaxis.com/api/football/team-info/62321b15adaf4b2bd73de814?widgetId=6edamnzlaqzm&lang=en&statsBlock=1&playersBlock=1&matchesBlock=1&links=1&font=heebo&fontSize=14&rowDensity=100&widgetWidth=auto&widgetHeight=auto&bodyColor=%23ffffff&textColor=%23141416&linkColor=%23141416&borderColor=%23ecf1f7&tabColor=%23f3f8fd" async></script>
                <div class="widget-main-link" style="padding: 6px 12px; font-weight: 500;">
                    Live data by <a href="https://www.scoreaxis.com/" style="color: inherit;">Scoreaxis</a>
                </div>
            </div>
        </section>

        <hr>

        <section id="ai-assistant">
            <h2>AI Assistant (GPT Powered)</h2>
            <div id="chat-window" style="height: 250px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; background: #f9f9f9; border-radius: 5px;">
                <p><strong>AI:</strong> Hello! It's April 2026. Ask me anything about Barça or your schedule.</p>
            </div>
            <div class="input-area" style="display: flex; gap: 10px; margin-top: 10px;">
                <input type="text" id="user-input" style="flex-grow: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc;" placeholder="Will Barça win the league this year?">
                <button onclick="askAI()" style="padding: 10px 20px; background: #004d98; color: white; border: none; border-radius: 5px; cursor: pointer;">Ask AI</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
    
    <script async defer src="https://apis.google.com/js/api.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client"></script>
</body>
</html>
